{% extends 'base.html' %}
<!--{% load static %}-->

{% block title %}
Logs
{% endblock %}

{% block content %}

<section class="history-page">
    
    <div class="history-card">
        <h1>
            All Logs
        </h1>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Time</th>
                    <th>Message</th>
                </tr>
            </thead>
            <tbody>

                {% for log in logs %}

                <tr>
                    <td>{{ log.id }}</td>
                    <td>{{ log.timestamp|date:"H:i:s" }}</td>
                    <td>{{ log.message }}</td>
                </tr>

                {% empty %}

                <tr>
                    <td colspan="3">No Logs Available</td>
                </tr>

                {% endfor %}

            </tbody>
        </table>
        
    </div>

</section>
{% endblock %}
